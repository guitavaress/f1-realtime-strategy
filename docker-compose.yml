version: "3.8"

services:
  api:
    build: .
    restart: always
    ports:
      - "8081:8081"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://airflow:airflow@postgres:5432/f1
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
    volumes:
      - ./realtime:/app/realtime   # hot-reload em dev
      - f1cache:/app/cache         # cache FastF1 compartilhado
    networks:
      - internal
      - f1-data-pipeline_default   # alcança o container postgres do pipeline

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - internal

volumes:
  f1cache:

networks:
  internal:
    driver: bridge
  f1-data-pipeline_default:
    external: true   # rede criada pelo docker compose do f1-data-pipeline
